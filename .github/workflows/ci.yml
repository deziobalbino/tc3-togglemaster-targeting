name: CI/CD Pipeline - Python Microservices

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  ECR_REPOSITORY: tc3-togglemaster-targeting
  AWS_REGION: us-east-1

jobs:
  # ESTÁGIO 1: Build & Test
  build-and-test:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar Dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Testes Unitários
        run: |
          echo "Nenhum teste unitário detectado no repositório."
          echo "Build validado. Avançando para Linter e Segurança..."

  # ESTÁGIO 2: DevSecOps (Linter, SAST e SCA)
  security-and-lint:
    name: Linter & Security Scan
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar ferramentas de segurança
        run: pip install flake8 bandit

      - name: Linter (Flake8)
        run: |
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: SAST (Bandit)
        run: |
          bandit -r . -ll -ii

      - name: SCA (Trivy Filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

  # ESTÁGIO 3: Docker, Scan e Push
  docker-build-and-scan:
    name: Docker Build, Scan & Push
    needs: security-and-lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Build da Imagem Docker local
        run: docker build -t app-image:${{ github.sha }} .

      - name: Container Scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'app-image:${{ github.sha }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Configurar credenciais da AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login no Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push da Imagem para o ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          docker tag app-image:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker tag app-image:$IMAGE_TAG $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:$IMAGE_TAG
          docker push $ECR_REGISTRY/${{ env.ECR_REPOSITORY }}:latest

  # ESTÁGIO 4: GitOps (Update Manifests)
  update-gitops:
    name: Update GitOps Repository
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: docker-build-and-scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do Repositório GitOps
        uses: actions/checkout@v4
        with:
          repository: deziobalbino/tc3-togglemaster
          token: ${{ secrets.GITOPS_PAT }}
          ref: main

      - name: Atualizar a tag da imagem no targeting-deployment.yaml
        env:
          AWS_ACCOUNT_ID: "923654441009"
          IMAGE_TAG: ${{ github.sha }}
        run: |
          NEW_IMAGE="${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:${IMAGE_TAG}"
          MANIFEST_PATH="gitops/targeting/targeting-deployment.yaml"

          echo "Atualizando imagem para: $NEW_IMAGE no arquivo $MANIFEST_PATH"

          sed -i "s|image: ${AWS_ACCOUNT_ID}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com/${{ env.ECR_REPOSITORY }}:.*|image: ${NEW_IMAGE}|g" $MANIFEST_PATH

      - name: Commit e Push das alterações
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"

          git add gitops/targeting/targeting-deployment.yaml

          if git diff --cached --quiet; then
            echo "Nenhuma alteração para commit."
            exit 0
          fi

          git commit -m "GitOps: Atualizando targeting-service para a tag ${{ github.sha }}"
          git push origin main